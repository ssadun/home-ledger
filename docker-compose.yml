version: "3.9"

services:
  backend:
    build:
      context: ./backend
      network: host
    container_name: home-ledger-api
    restart: unless-stopped
    environment:
      DATABASE_URL: sqlite:////app/data/home-ledger.db
      SECRET_KEY: change_this_in_production_please
      ALGORITHM: HS256
      ACCESS_TOKEN_EXPIRE_MINUTES: 1440
      TZ: Europe/Istanbul
      VAPID_PUBLIC_KEY: replace_with_generated_vapid_public_key
      VAPID_PRIVATE_KEY: replace_with_generated_vapid_private_key
      VAPID_CLAIMS_EMAIL: sadunsevingen@gmail.com
    ports:
      - "8100:8000"
    volumes:
      - ./data:/app/data        # SQLite dosyası burada — backup için sadece bu klasörü kopyala
      - ./uploads:/app/uploads  # OCR fişleri

  frontend:
    build:
      context: ./frontend
      network: host
    container_name: home-ledger-web
    restart: unless-stopped
    ports:
      - "3236:80"
    volumes:
      # Serve frontend files live from the host so edits show up on browser
      # refresh — no image rebuild needed. Rebuild only for nginx.conf/Dockerfile.
      - ./frontend:/usr/share/nginx/html:ro
    depends_on:
      - backend
