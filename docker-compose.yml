version: "3.9"

services:
  backend:
    build:
      context: ./backend
      network: host
    container_name: hyper-ledger-api
    restart: unless-stopped
    environment:
      DATABASE_URL: sqlite:////app/data/hyper-ledger.db
      SECRET_KEY: change_this_in_production_please
      ALGORITHM: HS256
      ACCESS_TOKEN_EXPIRE_MINUTES: 1440
    ports:
      - "8100:8000"
    volumes:
      - ./data:/app/data        # SQLite dosyası burada — backup için sadece bu klasörü kopyala
      - ./uploads:/app/uploads  # OCR fişleri

  frontend:
    build:
      context: ./frontend
      network: host
    container_name: hyper-ledger-web
    restart: unless-stopped
    ports:
      - "3236:80"
    depends_on:
      - backend

  playwright:
    build:
      context: ./playwright
      network: host
    container_name: hyper-ledger-playwright
    restart: unless-stopped
    network_mode: host
