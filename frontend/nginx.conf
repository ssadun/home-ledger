server {
  listen 80;
  root /usr/share/nginx/html;
  index Login.html;

  charset utf-8;

  # Emit relative Location headers so redirects keep the original host:port
  # (container listens on 80 but is port-mapped, e.g. 3236 on the host).
  absolute_redirect off;

  # Serve JSX as JavaScript so the browser's <script type="text/babel"> picks it up
  types {
    text/javascript            jsx;
    text/javascript            js;
    text/css                   css;
    text/html                  html;
    image/svg+xml              svg;
    image/png                  png;
    font/ttf                   ttf;
    application/manifest+json  webmanifest;
  }

  # Service worker must never be cached, so clients pick up new versions promptly.
  location = /sw.js {
    add_header Cache-Control "no-cache";
    add_header Service-Worker-Allowed "/";
    try_files $uri =404;
  }

  # Proxy all /api/* requests to the FastAPI backend
  location /api/ {
    proxy_pass         http://backend:8000;
    proxy_http_version 1.1;
    proxy_set_header   Host              $host;
    proxy_set_header   X-Real-IP         $remote_addr;
    proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header   X-Forwarded-Proto $scheme;
    proxy_read_timeout 120s;
  }

  # Exact root → Login
  location = / {
    return 302 /Login.html;
  }

  # App source (css/js/jsx/html) is served straight from files and changes often.
  # Force revalidation so browsers pick up edits immediately instead of serving a
  # heuristically-cached stale copy (nginx replies 304 when the file is unchanged).
  location ~* \.(css|js|jsx|html)$ {
    add_header Cache-Control "no-cache";
    try_files $uri =404;
  }

  # Static files — serve directly; 404 on miss
  location / {
    try_files $uri =404;
  }

  # Gzip text assets
  gzip on;
  gzip_types text/plain text/css application/javascript text/javascript application/json image/svg+xml;
  gzip_min_length 1024;
}
